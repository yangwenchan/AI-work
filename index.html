<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .line-clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">🚀 AI Prompt 智能寶庫</h1>
            <div class="max-w-xl mx-auto">
                <input type="text" id="searchInput" placeholder="🔍 搜尋提示詞..." 
                    class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-sm">
            </div>
        </header>

        <div id="filterBar" class="flex flex-wrap justify-center gap-3 mb-8">
            <button class="px-4 py-2 bg-purple-600 text-white rounded-full text-sm font-bold shadow-md" onclick="filterData('全部', this)">全部</button>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <p class="text-center col-span-full text-gray-500">正在載入寶庫資料...</p>
        </div>
    </div>

    <script>
        let allData = [];

        async function fetchData() {
            try {
                // ！！！請將此處替換為你部署的 Web App URL ！！！
                const url = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
                const response = await fetch(url);
                allData = await response.json();
                
                // 初始化分類標籤
                const categories = ['全部', ...new Set(allData.map(item => item.category))];
                const filterBar = document.getElementById('filterBar');
                filterBar.innerHTML = '';
                categories.forEach((cat, index) => {
                    const btn = document.createElement('button');
                    btn.className = index === 0 ? "px-4 py-2 bg-purple-600 text-white rounded-full text-sm font-bold shadow-md" : "px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-full text-sm font-medium hover:bg-gray-100";
                    btn.textContent = cat;
                    btn.onclick = () => filterData(cat, btn);
                    filterBar.appendChild(btn);
                });

                renderCards();
            } catch (error) {
                document.getElementById('cardGrid').innerHTML = '<p class="text-center text-red-500">資料載入失敗，請檢查 API 設定。</p>';
            }
        }

        function renderCards(filter = '全部', query = '') {
            const cardGrid = document.getElementById('cardGrid');
            cardGrid.innerHTML = '';
            
            const filtered = allData.filter(p => 
                (filter === '全部' || p.category === filter) &&
                (p.title.toLowerCase().includes(query.toLowerCase()) || p.content.toLowerCase().includes(query.toLowerCase()))
            );

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl card-shadow border-t-4 border-purple-600 hover:scale-105 transition-transform";
                card.innerHTML = `
                    <span class="text-xs font-bold text-purple-600 uppercase mb-2 block">${p.category}</span>
                    <h3 class="text-xl font-bold mb-3">${p.title}</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-4">${p.content}</p>
                    <button onclick="copyToClipboard('${p.content.replace(/'/g, "\\'")}')" class="w-full py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold">複製 Prompt</button>
                `;
                cardGrid.appendChild(card);
            });
        }

        function filterData(cat, btn) {
            document.querySelectorAll('#filterBar button').forEach(b => b.className = "px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-full text-sm font-medium hover:bg-gray-100");
            btn.className = "px-4 py-2 bg-purple-600 text-white rounded-full text-sm font-bold shadow-md";
            renderCards(cat, document.getElementById('searchInput').value);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const activeCat = document.querySelector('#filterBar .bg-purple-600').textContent;
            renderCards(activeCat, e.target.value);
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("Prompt 已複製到剪貼簿！");
        }

        fetchData();
    </script>
</body>
</html>
