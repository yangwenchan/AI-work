<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">🚀 AI Prompt 智能寶庫</h1>
            <div class="max-w-xl mx-auto">
                <input type="text" id="searchInput" placeholder="🔍 搜尋提示詞..." 
                    class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
            </div>
        </header>

        <!-- Filters -->
        <div id="filterContainer" class="flex flex-wrap justify-center gap-2 mb-10">
            <button class="filter-btn px-4 py-2 bg-blue-600 text-white rounded-full text-sm font-medium" data-category="全部">全部</button>
            <!-- Categories will be injected here -->
        </div>

        <!-- Cards Grid -->
        <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        // 資料來源 (基於你提供的資料庫內容)
        const prompts = [
            { title: "意義單詞", category: "內容創作", content: "將文章的重點部分，尋找一個代表性英文字母..." },
            { title: "品牌名稱", category: "內容創作", content: "完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想5個..." },
            { title: "長編文章", category: "筆記精煉", content: "為這一篇長篇文章，進行以下四個步驟..." },
            { title: "書籍精煉", category: "筆記精煉", content: "請對 @[檔名] 啟動【銓煙煉金管線】，一次執行四步驟整合..." },
            { title: "影片清理", category: "內容創作", content: "你的角色是一位「逐字稿校對員」，不是編輯..." }
        ];

        const cardGrid = document.getElementById('cardGrid');
        const filterContainer = document.getElementById('filterContainer');
        const searchInput = document.getElementById('searchInput');

        function renderCards(filter = '全部', search = '') {
            cardGrid.innerHTML = '';
            const filtered = prompts.filter(p => 
                (filter === '全部' || p.category === filter) &&
                (p.title.includes(search) || p.content.includes(search))
            );

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl card-shadow border-t-4 border-purple-600 flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-purple-600 uppercase mb-2 block">${p.category}</span>
                        <h3 class="text-xl font-bold mb-3">${p.title}</h3>
                        <p class="text-gray-600 text-sm mb-4 line-clamp-4">${p.content}</p>
                    </div>
                    <button onclick="copyToClipboard('${p.content}')" class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">複製 Prompt</button>
                `;
                cardGrid.appendChild(card);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("已複製到剪貼簿！");
        }

        // Initialize
        renderCards();

        // Search logic
        searchInput.addEventListener('input', (e) => renderCards(document.querySelector('.bg-blue-600').dataset.category, e.target.value));

        // Filter logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-gray-200'));
                btn.classList.replace('bg-gray-200', 'bg-blue-600');
                renderCards(btn.dataset.category, searchInput.value);
            });
        });
    </script>
</body>
</html>
