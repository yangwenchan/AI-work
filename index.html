<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">🚀 AI Prompt 智能寶庫</h1>
            <div class="max-w-xl mx-auto">
                <input type="text" id="searchInput" placeholder="🔍 搜尋提示詞..." 
                    class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
            </div>
        </header>

        <!-- Filters -->
        <div id="filterContainer" class="flex flex-wrap justify-center gap-2 mb-10">
            <button class="filter-btn px-4 py-2 bg-blue-600 text-white rounded-full text-sm font-medium" data-category="全部">全部</button>
        </div>

        <!-- Cards Grid -->
        <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <p class="col-span-full text-center">正在從雲端資料庫讀取資料...</p>
        </div>
    </div>

    <script>
        // 【重要】請將下方連結替換為您 Google Sheet 發布的 CSV 網址
        const CSV_URL = 'YOUR_CSV_URL_HERE';
        let allPrompts = [];

        async function init() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                // 解析 CSV (假設第一欄標題, 第二欄分類, 第三欄內容)
                const rows = text.split('\n').slice(1);
                allPrompts = rows.map(row => {
                    const cols = row.split(',');
                    return { title: cols[0], category: cols[1], content: cols[2] };
                }).filter(p => p.title);

                // 產生分類按鈕
                const categories = ['全部', ...new Set(allPrompts.map(p => p.category))];
                const container = document.getElementById('filterContainer');
                container.innerHTML = '';
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = `filter-btn px-4 py-2 ${cat === '全部' ? 'bg-blue-600' : 'bg-gray-200'} text-white rounded-full text-sm font-medium`;
                    btn.dataset.category = cat;
                    btn.textContent = cat;
                    btn.onclick = () => updateUI(cat);
                    container.appendChild(btn);
                });

                updateUI();
            } catch (e) {
                document.getElementById('cardGrid').innerHTML = '<p class="col-span-full text-center text-red-500">無法讀取資料庫，請檢查發布設定。</p>';
            }
        }

        function updateUI(filter = '全部') {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const cardGrid = document.getElementById('cardGrid');
            cardGrid.innerHTML = '';

            // 更新按鈕樣式
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = btn.dataset.category === filter ? "filter-btn px-4 py-2 bg-blue-600 text-white rounded-full text-sm font-medium" : "filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-full text-sm font-medium";
            });

            const filtered = allPrompts.filter(p => 
                (filter === '全部' || p.category === filter) &&
                (p.title.toLowerCase().includes(searchVal) || p.content.toLowerCase().includes(searchVal))
            );

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl card-shadow border-t-4 border-purple-600 flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-purple-600 uppercase mb-2 block">${p.category}</span>
                        <h3 class="text-xl font-bold mb-3">${p.title}</h3>
                        <p class="text-gray-600 text-sm mb-4 line-clamp-4">${p.content}</p>
                    </div>
                    <button onclick="copyToClipboard('${p.content.replace(/'/g, "\\'")}')" class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">複製 Prompt</button>
                `;
                cardGrid.appendChild(card);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("已複製到剪貼簿！");
        }

        document.getElementById('searchInput').addEventListener('input', () => {
            const activeFilter = document.querySelector('.bg-blue-600').dataset.category;
            updateUI(activeFilter);
        });

        init();
    </script>
</body>
</html>
