<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .line-clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">🚀 AI Prompt 智能寶庫</h1>
            <div class="max-w-xl mx-auto">
                <input type="text" id="searchInput" placeholder="🔍 搜尋提示詞..." 
                    class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-sm">
            </div>
        </header>

        <!-- 分類標籤 -->
        <div id="filterBar" class="flex flex-wrap justify-center gap-3 mb-8">
            <button class="px-4 py-2 bg-purple-600 text-white rounded-full text-sm font-bold shadow-md" onclick="filterData('全部', this)">全部</button>
            <button class="px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-full text-sm font-medium hover:bg-gray-100" onclick="filterData('內容創作', this)">內容創作</button>
            <button class="px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-full text-sm font-medium hover:bg-gray-100" onclick="filterData('筆記精煉', this)">筆記精煉</button>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- 預覽資料將由 JavaScript 渲染 -->
        </div>
    </div>

    <script>
        // 測試資料庫
        const data = [
            { title: "意義單詞發想", category: "內容創作", content: "將文章的重點部分，尋找一個代表性英文字母，並解釋其與文章核心意義的連結。" },
            { title: "品牌名稱生成", category: "內容創作", content: "完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想 5 個吸引人的品牌名稱。" },
            { title: "長文精華摘要", category: "筆記精煉", content: "為這一篇長篇文章，進行以下四個步驟：提出核心論點、列出關鍵數據、總結作者觀點、給出實踐建議。" },
            { title: "書籍知識煉金", category: "筆記精煉", content: "請對文章啟動【銓煙煉金管線】，一次執行四步驟整合，並輸出成條列式筆記。" },
            { title: "影片逐字稿校對", category: "內容創作", content: "你的角色是一位「逐字稿校對員」，請協助修正口語贅字並標記出重點時間軸。" }
        ];

        function renderCards(filter = '全部', query = '') {
            const cardGrid = document.getElementById('cardGrid');
            cardGrid.innerHTML = '';
            
            const filtered = data.filter(p => 
                (filter === '全部' || p.category === filter) &&
                (p.title.includes(query) || p.content.includes(query))
            );

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl card-shadow border-t-4 border-purple-600 hover:scale-105 transition-transform";
                card.innerHTML = `
                    <span class="text-xs font-bold text-purple-600 uppercase mb-2 block">${p.category}</span>
                    <h3 class="text-xl font-bold mb-3">${p.title}</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-4">${p.content}</p>
                    <button onclick="copyToClipboard('${p.content}')" class="w-full py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold">複製 Prompt</button>
                `;
                cardGrid.appendChild(card);
            });
        }

        function filterData(cat, btn) {
            document.querySelectorAll('#filterBar button').forEach(b => b.className = "px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-full text-sm font-medium hover:bg-gray-100");
            btn.className = "px-4 py-2 bg-purple-600 text-white rounded-full text-sm font-bold shadow-md";
            renderCards(cat, document.getElementById('searchInput').value);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const activeCat = document.querySelector('#filterBar .bg-purple-600').textContent;
            renderCards(activeCat, e.target.value);
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("Prompt 已複製到剪貼簿！");
        }

        renderCards();
    </script>
</body>
</html>
